<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>gestión · ram peris</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="manifest" href="/gestion-manifest.json"/>
  <meta name="theme-color" content="#B87A3A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Gestión"/>
  <link rel="apple-touch-icon" href="/img/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F5F0E4; font-family: 'Nunito', sans-serif; }
    input, button, select { font-family: 'Nunito', sans-serif; }
    #root { height: 100%; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PASS        = "Gratitudeterna";
const AUTH_KEY    = "ram_gestion_auth";
const ESTADOS          = ["pendiente", "reserva", "completo", "no viene"];
const ESTADOS_DONACION = ["confirmado", "estuvo", "no viene"];
const COLOR = {
  pendiente:  { bg: "#F5F0E4", text: "#2E2010", border: "#e0d8c8" },
  reserva:    { bg: "#B87A3A", text: "#F5F0E4", border: "#B87A3A" },
  completo:   { bg: "#424029", text: "#F5F0E4", border: "#424029" },
  confirmado: { bg: "#F5F0E4", text: "#2E2010", border: "#B87A3A" },
  estuvo:     { bg: "#424029", text: "#F5F0E4", border: "#424029" },
  "no viene": { bg: "#2E2010", text: "#c8b890", border: "#2E2010" },
};
const LABEL = {
  pendiente:  "pendiente",
  reserva:    "reserva",
  completo:   "✓ completo",
  confirmado: "confirmado",
  estuvo:     "✓ estuvo",
  "no viene": "no viene",
};

function genId()  { return Math.random().toString(36).slice(2,9); }
function today()  { return new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function fmt(n)   {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return n % 1 === 0 ? `${n}€` : `${n.toFixed(2)}€`;
}
function savedAuth() {
  try { return localStorage.getItem(AUTH_KEY) === PASS; } catch { return false; }
}

function cobradoAs(a, s) {
  const pt = parseFloat(s.precioTotal)||0, pr = parseFloat(s.precioReserva)||0, p = a.x2?2:1;
  if (a.estado === "completo") return pt * p;
  if (a.estado === "reserva")  return pr * p;
  return 0;
}
function pendienteAs(a, s) {
  const pt = parseFloat(s.precioTotal)||0, pr = parseFloat(s.precioReserva)||0, p = a.x2?2:1;
  if (a.estado === "completo")  return 0;
  if (a.estado === "reserva")   return (pt - pr) * p;
  if (a.estado === "pendiente") return pt * p;
  return 0;
}
function finanzas(s) {
  if (s.tipo === "donacion") {
    const don = parseFloat(s.donacion)||0;
    return { cobrado: don, pendiente: 0, total: don, miParte: don*((s.splitPct||100)/100) };
  }
  const act = s.asistentes.filter(a => a.estado !== "no viene");
  const cobrado   = act.reduce((n,a) => n + cobradoAs(a,s), 0);
  const pendiente = act.reduce((n,a) => n + pendienteAs(a,s), 0);
  return { cobrado, pendiente, total: cobrado+pendiente, miParte: cobrado*(s.splitPct/100) };
}

const TIPOS_EVENTO = [
  { id: "circulo",      label: "Círculo de Hombres" },
  { id: "bano-sup",     label: "Baño de Sonido SUP" },
  { id: "breath-sound", label: "Breath & Sound" },
  { id: "otro",         label: "Otro" },
];

function parseFecha(f) {
  if (!f) return new Date(0);
  const [d, m, y] = f.split('/');
  return new Date(+y, +m - 1, +d);
}

function inferTipoEvento(nombre) {
  const n = (nombre||"").toLowerCase();
  if (n.includes("circulo") || n.includes("círculo") || n.includes("hombre")) return "circulo";
  if (n.includes("sup") || n.includes("paddle") || n.includes("bano sonido") || n.includes("baño sonido")) return "bano-sup";
  if (n.includes("breath") || n.includes("sound")) return "breath-sound";
  return "otro";
}
function getMes(fecha) {
  const f = parseFecha(fecha);
  if (isNaN(f.getTime())) return "Sin fecha";
  const M = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return `${M[f.getMonth()]} ${f.getFullYear()}`;
}
function labelTipo(id) {
  const t = TIPOS_EVENTO.find(t => t.id === id);
  return t ? t.label : "Otro";
}

// ── STYLES ───────────────────────────────────────────────────────────────────
const wrap  = { fontFamily:"'Nunito',sans-serif", background:"#F5F0E4", minHeight:"100vh", color:"#2E2010", maxWidth:480, margin:"0 auto", paddingBottom:80 };
const hdr   = { padding:"18px 20px 14px", borderBottom:"1px solid #e0d8c8", display:"flex", alignItems:"center", gap:10 };
const backB = { background:"none", border:"none", fontSize:24, cursor:"pointer", color:"#B87A3A", padding:0, lineHeight:1 };
const inp   = () => ({ width:"100%", fontSize:15, padding:"10px 14px", borderRadius:10, border:"1.5px solid #e0d8c8", background:"#fff", outline:"none", color:"#2E2010" });
const btnPrimary = () => ({ width:"100%", background:"#B87A3A", color:"#F5F0E4", border:"none", borderRadius:14, padding:"16px", fontSize:15, fontWeight:800, cursor:"pointer", letterSpacing:0.5 });
const bsm = (bg, color) => ({ background:bg, color, border:"none", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer" });

// ── COMPONENTS ───────────────────────────────────────────────────────────────
function FR({label, value, bold}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
      <span style={{color:"#c8b890"}}>{label}</span>
      <span style={{fontWeight:bold?800:600,color:bold?"#F5F0E4":"#c8b890"}}>{value}</span>
    </div>
  );
}
function SB({label, value, accent, amber, muted}) {
  return (
    <div style={{flex:1,background:accent?"#424029":amber?"#B87A3A":muted?"#e8e0d0":"#fff",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
      <div style={{fontSize:20,fontWeight:800,color:accent||amber?"#F5F0E4":muted?"#8a7a60":"#2E2010"}}>{value}</div>
      <div style={{fontSize:9,letterSpacing:0.8,textTransform:"uppercase",color:accent||amber?"rgba(255,255,255,0.6)":"#8a7a60",fontWeight:700}}>{label}</div>
    </div>
  );
}
function Pill({label, color}) {
  return <div style={{background:color,color:"#F5F0E4",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:800}}>{label}</div>;
}
function Lbl({children}) {
  return <div style={{fontSize:11,letterSpacing:1.2,textTransform:"uppercase",fontWeight:800,color:"#B87A3A",marginBottom:6}}>{children}</div>;
}

function AsRow({a, s, onCycle, onSet, onX2, onDel, onRename}) {
  const [open, setOpen] = useState(false);
  const [editingName, setEditingName] = useState(false);
  const [tmpName, setTmpName] = useState("");
  const col       = COLOR[a.estado] || COLOR["pendiente"];
  const cobrado   = cobradoAs(a, s);
  const pendiente = pendienteAs(a, s);
  const tP        = !!s.precioTotal;
  const esDon     = s.tipo === "donacion";
  const listaEstados = esDon ? ESTADOS_DONACION : ESTADOS;
  return (
    <div style={{marginBottom:8}}>
      <div style={{background:"#fff",borderRadius:open?"12px 12px 0 0":12,border:`1.5px solid ${col.border}`,display:"flex",alignItems:"center",overflow:"hidden"}}>
        <button onClick={onCycle} style={{background:col.bg,color:col.text,border:"none",padding:"12px 10px",fontSize:10,fontWeight:800,cursor:"pointer",minWidth:70,textAlign:"center",letterSpacing:0.3,flexShrink:0}}>
          {LABEL[a.estado] || a.estado}
        </button>
        <div style={{flex:1,padding:"0 8px"}}>
          <div style={{fontWeight:700,fontSize:15}}>
            {a.nombre}
            {a.x2 && !esDon && <span style={{fontSize:11,color:"#B87A3A",fontWeight:800,marginLeft:5}}>×2</span>}
          </div>
          {tP && !esDon && (
            <div style={{fontSize:11,marginTop:1}}>
              {cobrado   > 0 && <span style={{color:"#424029",fontWeight:700}}>{fmt(cobrado)} </span>}
              {pendiente > 0 && <span style={{color:"#B87A3A"}}>· {fmt(pendiente)} pendiente</span>}
              {a.estado === "no viene" && <span style={{color:"#a09080"}}>—</span>}
            </div>
          )}
        </div>
        <button onClick={() => setOpen(!open)} style={{background:"none",border:"none",padding:"12px 14px",cursor:"pointer",color:"#B87A3A",fontSize:16}}>{open?"×":"›"}</button>
      </div>
      {open && (
        <div style={{background:"#fff",borderRadius:"0 0 12px 12px",border:"1.5px solid #e0d8c8",borderTop:"none",padding:"10px 12px"}}>
          {editingName
            ? <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input autoFocus value={tmpName} onChange={e=>setTmpName(e.target.value)}
                  onKeyDown={e=>{ if(e.key==="Enter"){ if(tmpName.trim()) onRename(tmpName.trim()); setEditingName(false); } if(e.key==="Escape") setEditingName(false); }}
                  style={{flex:1,fontSize:14,fontWeight:700,padding:"6px 10px",borderRadius:8,border:"1.5px solid #B87A3A",outline:"none",fontFamily:"'Nunito',sans-serif"}}/>
                <button onClick={()=>{ if(tmpName.trim()) onRename(tmpName.trim()); setEditingName(false); }} style={bsm("#B87A3A","#F5F0E4")}>guardar</button>
                <button onClick={()=>setEditingName(false)} style={bsm("#e0d8c8","#2E2010")}>cancelar</button>
              </div>
            : <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {listaEstados.map(e => (
                  <button key={e} onClick={() => { onSet(e); setOpen(false); }} style={{...bsm(a.estado===e?COLOR[e].bg:"#F5F0E4",a.estado===e?COLOR[e].text:"#2E2010"),border:`1.5px solid ${a.estado===e?COLOR[e].border:"#e0d8c8"}`}}>
                    {LABEL[e]}
                  </button>
                ))}
                {!esDon && <button onClick={() => { onX2(); setOpen(false); }} style={bsm(a.x2?"#B87A3A":"#F5F0E4",a.x2?"#F5F0E4":"#8a7a60")}>{a.x2?"quitar ×2":"añadir ×2"}</button>}
                <button onClick={() => { setEditingName(true); setTmpName(a.nombre); }} style={bsm("#e8e0d0","#2E2010")}>editar</button>
                <button onClick={() => { onDel(); setOpen(false); }} style={bsm("#2E2010","#F5F0E4")}>eliminar</button>
              </div>
          }
        </div>
      )}
    </div>
  );
}

// ── PIPELINE CARD (desktop) ───────────────────────────────────────────────────
function PipelineCard({ s, onClick }) {
  const fin     = finanzas(s);
  const activos = s.asistentes.filter(a => a.estado !== "no viene").reduce((n,a) => n+(a.x2?2:1), 0);
  const total   = s.asistentes.reduce((n,a) => n+(a.x2?2:1), 0);
  const noV     = s.asistentes.filter(a => a.estado === "no viene").reduce((n,a) => n+(a.x2?2:1), 0);
  return (
    <div onClick={onClick} style={{background:"#fff",borderRadius:12,padding:"12px 14px",cursor:"pointer",border:"1.5px solid #e0d8c8",marginBottom:8}}>
      <div style={{fontWeight:800,fontSize:14,marginBottom:2,color:"#2E2010"}}>{s.nombre}</div>
      <div style={{fontSize:11,color:"#8a7a60",marginBottom:8}}>{s.fecha}</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6}}>
        <div style={{display:"flex",gap:4}}>
          <Pill label={`${activos}/${total}`} color="#424029"/>
          {noV > 0 && <Pill label={`-${noV}`} color="#B87A3A"/>}
        </div>
        {fin.miParte > 0 && <span style={{fontSize:12,color:"#B87A3A",fontWeight:800}}>{fmt(fin.miParte)} tuyo</span>}
      </div>
    </div>
  );
}

// ── SYNC INDICATOR ───────────────────────────────────────────────────────────
function SyncBar({state, onRetry}) {
  if (state === 'idle') return null;
  return (
    <div style={{textAlign:"center",padding:"4px 20px",fontSize:11,color:state==="error"?"#B87A3A":"#8a7a60",background:state==="error"?"rgba(184,122,58,0.08)":"transparent"}}>
      {state === "saving"
        ? "guardando..."
        : <>⚠ error al guardar · <button onClick={onRetry} style={{background:"none",border:"none",color:"#B87A3A",cursor:"pointer",fontWeight:800,fontSize:11,padding:0}}>reintentar</button></>
      }
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [auth,        setAuth]        = useState(savedAuth);
  const [passIn,      setPassIn]      = useState("");
  const [passErr,     setPassErr]     = useState(false);
  const [loading,     setLoading]     = useState(false);
  const [loadErr,     setLoadErr]     = useState(false);
  const [syncState,   setSyncState]   = useState("idle"); // 'idle' | 'saving' | 'error'
  const [sesiones,    setSesiones]    = useState([]);
  const [activaId,    setActivaId]    = useState(null);
  const [vista,       setVista]       = useState("sesiones");
  const [config,      setConfig]      = useState(null);
  const [inputAs,     setInputAs]     = useState("");
  const [x2New,       setX2New]       = useState(false);
  const [editNombre,  setEditNombre]  = useState(false);
  const [nuevoNombre, setNuevoNombre] = useState("");
  const [confirmDel,  setConfirmDel]  = useState(null);
  const [reporte,     setReporte]     = useState(false);
  const [isMobile,    setIsMobile]    = useState(() => window.innerWidth < 900);
  const [vistaDesk,   setVistaDesk]   = useState("pipeline"); // "pipeline" | "dashboard"
  const [dashTab,     setDashTab]     = useState("resumen");  // "resumen" | "mes" | "tipo"
  const [filtroMes,   setFiltroMes]   = useState(null);
  const [mesExpandido,setMesExpandido]= useState(null);

  const shaRef      = useRef(null);
  const timerRef    = useRef(null);
  const activa      = sesiones.find(s => s.id === activaId);

  // ── Cargar datos al autenticarse ──────────────────────────────────────────
  useEffect(() => {
    if (!auth) return;
    setLoading(true);
    setLoadErr(false);
    fetch('/api/gestion', { headers: { Authorization: `Bearer ${PASS}` } })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        setSesiones(data.sesiones || []);
        shaRef.current = data.sha || null;
        setLoading(false);
      })
      .catch(() => {
        setLoadErr(true);
        setLoading(false);
      });
  }, [auth]);

  // ── Resize detector ──────────────────────────────────────────────────────
  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth < 900);
    window.addEventListener('resize', fn, { passive: true });
    return () => window.removeEventListener('resize', fn);
  }, []);

  // ── Guardar (debounced 700ms) ─────────────────────────────────────────────
  function triggerSave(newSesiones) {
    if (timerRef.current) clearTimeout(timerRef.current);
    setSyncState("saving");
    timerRef.current = setTimeout(async () => {
      try {
        const r = await fetch('/api/gestion', {
          method: 'POST',
          headers: { Authorization: `Bearer ${PASS}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ sesiones: newSesiones, sha: shaRef.current }),
        });
        if (!r.ok) throw new Error();
        const { sha } = await r.json();
        shaRef.current = sha;
        setSyncState("idle");
      } catch {
        setSyncState("error");
      }
    }, 700);
  }

  // ── Mutación + save ───────────────────────────────────────────────────────
  function setSes(updater) {
    setSesiones(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      triggerSave(next);
      return next;
    });
  }
  function upd(id, patch) {
    setSes(prev => prev.map(s => s.id === id ? {...s, ...patch} : s));
  }

  // ── LOGIN ─────────────────────────────────────────────────────────────────
  function login() {
    if (passIn === PASS) {
      try { localStorage.setItem(AUTH_KEY, PASS); } catch {}
      setAuth(true);
    } else {
      setPassErr(true);
      setTimeout(() => setPassErr(false), 1500);
    }
  }
  function logout() {
    try { localStorage.removeItem(AUTH_KEY); } catch {}
    setAuth(false);
    setSesiones([]);
    shaRef.current = null;
    setVista("sesiones");
  }

  // ── SESIONES ──────────────────────────────────────────────────────────────
  function nuevaSesion() {
    const s = { id:genId(), nombre:"nueva sesión", fecha:today(), tipo:"precio", tipoEvento:"otro", precioTotal:"", precioReserva:"", splitPct:50, donacion:"", asistentes:[] };
    setSes(prev => [s, ...prev]);
    setActivaId(s.id); setConfig({...s}); setVista("config");
  }
  function guardarConfig() {
    const esDonacion = config.tipo === "donacion";
    upd(activaId, {
      nombre:       config.nombre||"sin nombre",
      fecha:        config.fecha||today(),
      tipo:         config.tipo||"precio",
      tipoEvento:   config.tipoEvento||"otro",
      precioTotal:  esDonacion ? "" : config.precioTotal,
      precioReserva:esDonacion ? "" : config.precioReserva,
      splitPct:     config.splitPct,
    });
    setVista("sesion");
  }

  // ── ASISTENTES ────────────────────────────────────────────────────────────
  function addAs() {
    const n = inputAs.trim(); if (!n || !activa) return;
    upd(activaId, { asistentes:[...activa.asistentes, {id:genId(),nombre:n,x2:x2New,estado:"pendiente"}] });
    setInputAs(""); setX2New(false);
  }
  function cycleAs(aid) {
    const lista = activa.tipo === "donacion" ? ESTADOS_DONACION : ESTADOS;
    upd(activaId, { asistentes: activa.asistentes.map(a => {
      if (a.id !== aid) return a;
      const idx = lista.indexOf(a.estado);
      return {...a, estado: lista[(idx < 0 ? 0 : idx+1) % lista.length]};
    })});
  }
  function setEstadoAs(aid, estado) { upd(activaId, { asistentes: activa.asistentes.map(a => a.id===aid?{...a,estado}:a) }); }
  function toggleX2As(aid)          { upd(activaId, { asistentes: activa.asistentes.map(a => a.id===aid?{...a,x2:!a.x2}:a) }); }
  function delAs(aid)               { upd(activaId, { asistentes: activa.asistentes.filter(a => a.id!==aid) }); }
  function renameAs(aid, nombre)    { upd(activaId, { asistentes: activa.asistentes.map(a => a.id===aid?{...a,nombre}:a) }); }

  // ══════════════════════════════════════════════════════════════════════════
  // VISTAS
  // ══════════════════════════════════════════════════════════════════════════

  // ── LOGIN ─────────────────────────────────────────────────────────────────
  if (!auth) return (
    <div style={{...wrap,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{width:"100%",maxWidth:340,padding:"0 24px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#B87A3A",fontWeight:800,marginBottom:6}}>ram peris</div>
          <div style={{fontSize:28,fontWeight:800}}>gestión</div>
        </div>
        <input
          type="password" value={passIn}
          onChange={e => setPassIn(e.target.value)}
          onKeyDown={e => { if (e.key==="Enter") login(); }}
          placeholder="contraseña"
          style={{...inp(),marginBottom:12,textAlign:"center",fontSize:17,letterSpacing:2,border:passErr?"1.5px solid #B87A3A":"1.5px solid #e0d8c8"}}
          autoFocus
        />
        <button onClick={login} style={btnPrimary()}>entrar</button>
        {passErr && <div style={{textAlign:"center",color:"#B87A3A",fontSize:13,marginTop:10}}>contraseña incorrecta</div>}
      </div>
    </div>
  );

  // ── CARGANDO ──────────────────────────────────────────────────────────────
  if (loading) return (
    <div style={{...wrap,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{color:"#B87A3A",fontSize:14,letterSpacing:0.5}}>cargando...</div>
    </div>
  );

  // ── ERROR DE CARGA ────────────────────────────────────────────────────────
  if (loadErr) return (
    <div style={{...wrap,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{textAlign:"center",padding:"0 24px"}}>
        <div style={{fontSize:14,color:"#2E2010",marginBottom:8}}>error al conectar con GitHub</div>
        <div style={{fontSize:12,color:"#8a7a60",marginBottom:24}}>comprueba el token y vuelve a intentarlo</div>
        <button onClick={() => { setLoadErr(false); setAuth(false); }} style={{...btnPrimary(),width:"auto",padding:"12px 32px"}}>volver</button>
      </div>
    </div>
  );

  // ── CONFIG ────────────────────────────────────────────────────────────────
  if (vista === "config" && config) {
    const pv  = parseFloat(config.precioTotal)||0;
    const pvR = parseFloat(config.precioReserva)||0;
    return (
      <div style={wrap}>
        <div style={hdr}>
          <button onClick={() => setVista("sesiones")} style={backB}>‹</button>
          <span style={{fontSize:20,fontWeight:800}}>configurar sesión</span>
        </div>
        <div style={{padding:20}}>
          <Lbl>tipo de evento</Lbl>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {TIPOS_EVENTO.map(({id,label}) => (
              <button key={id} onClick={() => setConfig(p=>{const fill=p.nombre==="nueva sesión"||TIPOS_EVENTO.some(t=>t.label===p.nombre);return{...p,tipoEvento:id,nombre:fill?label:p.nombre};})} style={{padding:"8px 14px",borderRadius:10,border:`1.5px solid ${(config.tipoEvento||"otro")===id?"#B87A3A":"#e0d8c8"}`,background:(config.tipoEvento||"otro")===id?"#B87A3A":"#fff",color:(config.tipoEvento||"otro")===id?"#F5F0E4":"#2E2010",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>{label}</button>
            ))}
          </div>
          <Lbl>nombre</Lbl>
          <input value={config.nombre} onChange={e => setConfig(p=>({...p,nombre:e.target.value}))} placeholder="ej. Círculo Hombres 24/06" style={inp()}/>
          <div style={{height:16}}/>
          <Lbl>fecha</Lbl>
          <input value={config.fecha} onChange={e => setConfig(p=>({...p,fecha:e.target.value}))} placeholder="ej. 09/06/2026" style={inp()}/>
          <div style={{height:16}}/>
          <Lbl>tipo</Lbl>
          <div style={{display:"flex",gap:8}}>
            {[["precio","precio fijo"],["donacion","donación"]].map(([val,lbl]) => (
              <button key={val} onClick={() => setConfig(p=>({...p,tipo:val}))} style={{flex:1,padding:"10px 0",borderRadius:10,border:`1.5px solid ${(config.tipo||"precio")===val?"#B87A3A":"#e0d8c8"}`,background:(config.tipo||"precio")===val?"#B87A3A":"#fff",color:(config.tipo||"precio")===val?"#F5F0E4":"#2E2010",fontWeight:800,fontSize:14,cursor:"pointer"}}>{lbl}</button>
            ))}
          </div>
          <div style={{height:16}}/>
          {(config.tipo||"precio") === "precio" && (<>
          <Lbl>precio por persona (€)</Lbl>
          <input value={config.precioTotal} onChange={e => setConfig(p=>({...p,precioTotal:e.target.value}))} placeholder="ej. 35" inputMode="decimal" style={inp()}/>
          <div style={{height:16}}/>
          <Lbl>precio reserva (€) <span style={{color:"#B87A3A",fontWeight:400}}>opcional</span></Lbl>
          <input value={config.precioReserva} onChange={e => setConfig(p=>({...p,precioReserva:e.target.value}))} placeholder="ej. 15" inputMode="decimal" style={inp()}/>
          <div style={{height:16}}/>
          </>)}
          <Lbl>tu parte (%)</Lbl>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            {[50,60,70,100].map(pct => (
              <button key={pct} onClick={() => setConfig(p=>({...p,splitPct:pct}))} style={{
                flex:1,padding:"10px 0",borderRadius:10,
                border:`1.5px solid ${config.splitPct===pct?"#B87A3A":"#e0d8c8"}`,
                background:config.splitPct===pct?"#B87A3A":"#fff",
                color:config.splitPct===pct?"#F5F0E4":"#2E2010",
                fontWeight:800,fontSize:15,cursor:"pointer",
              }}>{pct}%</button>
            ))}
          </div>
          {pv>0 && (
            <div style={{marginTop:20,background:"#fff",borderRadius:12,padding:"14px 16px",border:"1.5px solid #e0d8c8"}}>
              <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",fontWeight:800,color:"#B87A3A",marginBottom:8}}>ejemplo · 1 persona</div>
              <FR label="precio completo" value={fmt(pv)}/>
              {pvR>0 && <FR label="si paga reserva" value={fmt(pvR)}/>}
              {pvR>0 && <FR label="resto al llegar"  value={fmt(pv-pvR)}/>}
              <div style={{borderTop:"1px solid #e0d8c8",marginTop:8,paddingTop:8}}>
                <FR label={`tu parte (${config.splitPct}%)`} value={fmt(pv*config.splitPct/100)} bold/>
              </div>
            </div>
          )}
          <button onClick={guardarConfig} style={{...btnPrimary(),marginTop:24}}>guardar y empezar</button>
        </div>
      </div>
    );
  }

  // ── PIPELINE + DASHBOARD DESKTOP ─────────────────────────────────────────
  if (!isMobile && vista === "sesiones") {
    const hoy  = new Date(); hoy.setHours(0,0,0,0);
    const en14 = new Date(hoy); en14.setDate(hoy.getDate() + 14);
    const byFecha = (a, b) => parseFecha(a.fecha) - parseFecha(b.fecha);
    const pasadas  = sesiones.filter(s => parseFecha(s.fecha) < hoy).sort((a,b) => parseFecha(b.fecha) - parseFecha(a.fecha));
    const proximas = sesiones.filter(s => { const f = parseFecha(s.fecha); return f >= hoy && f <= en14; }).sort(byFecha);
    const futuras  = sesiones.filter(s => parseFecha(s.fecha) > en14).sort(byFecha);

    // ── Métricas ──
    const MESES_ORD = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    const porMes = {}, porTipo = {};
    sesiones.forEach(s => {
      const mes  = getMes(s.fecha);
      const tipo = s.tipoEvento || inferTipoEvento(s.nombre);
      const fin  = finanzas(s);
      const act  = s.asistentes.filter(a => a.estado !== "no viene").reduce((n,a) => n+(a.x2?2:1), 0);
      const noV  = s.asistentes.filter(a => a.estado === "no viene").reduce((n,a) => n+(a.x2?2:1), 0);
      if (!porMes[mes])  porMes[mes]  = { sesiones:0, asistentes:0, ingresos:0, miParte:0, noShows:0 };
      porMes[mes].sesiones++;  porMes[mes].asistentes += act;
      porMes[mes].ingresos += fin.cobrado; porMes[mes].miParte += fin.miParte; porMes[mes].noShows += noV;
      if (!porTipo[tipo]) porTipo[tipo] = { sesiones:0, asistentes:0, ingresos:0, miParte:0 };
      porTipo[tipo].sesiones++; porTipo[tipo].asistentes += act;
      porTipo[tipo].ingresos += fin.cobrado; porTipo[tipo].miParte += fin.miParte;
    });
    const mesesList = Object.keys(porMes).sort((a,b) => {
      const [ma,ya] = a.split(" "), [mb,yb] = b.split(" ");
      return ya !== yb ? +ya - +yb : MESES_ORD.indexOf(ma) - MESES_ORD.indexOf(mb);
    });
    const TIPO_COLOR = { circulo:"#424029", "bano-sup":"#B87A3A", "breath-sound":"#6a8a70", otro:"#c8b890" };
    const monthTypeData = {}, monthTypeMiP = {};
    mesesList.forEach(mes => { monthTypeData[mes] = {}; monthTypeMiP[mes] = {}; });
    sesiones.forEach(s => {
      const mes = getMes(s.fecha); const tipo = s.tipoEvento || inferTipoEvento(s.nombre);
      const fin = finanzas(s);
      if (monthTypeData[mes]) { monthTypeData[mes][tipo] = (monthTypeData[mes][tipo]||0) + fin.cobrado; monthTypeMiP[mes][tipo] = (monthTypeMiP[mes][tipo]||0) + fin.miParte; }
    });
    const maxMesTotal = Math.max(...mesesList.map(mes => Object.values(monthTypeData[mes]||{}).reduce((a,b)=>a+b,0)), 1);
    const sesFiltradas = filtroMes ? sesiones.filter(s => getMes(s.fecha) === filtroMes) : sesiones;
    const totalSes  = sesFiltradas.length;
    const totalAsis = sesFiltradas.reduce((n,s) => n + s.asistentes.filter(a=>a.estado!=="no viene").reduce((m,a)=>m+(a.x2?2:1),0), 0);
    const totalIng  = sesFiltradas.reduce((n,s) => n + finanzas(s).cobrado, 0);
    const totalMiP  = sesFiltradas.reduce((n,s) => n + finanzas(s).miParte, 0);
    const totalNoS  = sesFiltradas.reduce((n,s) => n + s.asistentes.filter(a=>a.estado==="no viene").reduce((m,a)=>m+(a.x2?2:1),0), 0);
    const maxIngMes  = Math.max(...Object.values(porMes).map(m=>m.miParte), 1);
    const maxIngTipo = Math.max(...Object.values(porTipo).map(t=>t.ingresos), 1);
    const Bar = ({val, max, color="#B87A3A"}) => (
      <div style={{height:5,background:"#e0d8c8",borderRadius:3,marginTop:5,flexShrink:0}}>
        <div style={{height:"100%",width:`${Math.round((val/max)*100)}%`,background:color,borderRadius:3}}/>
      </div>
    );
    const TabBtn = ({id, label}) => (
      <button onClick={()=>setDashTab(id)} style={{padding:"6px 16px",borderRadius:8,border:"none",background:dashTab===id?"#2E2010":"transparent",color:dashTab===id?"#F5F0E4":"#8a7a60",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif",letterSpacing:0.3}}>{label}</button>
    );
    const ColHdr = ({label, count, color}) => (
      <div style={{fontSize:10,letterSpacing:1.8,textTransform:"uppercase",fontWeight:800,color,marginBottom:14,paddingBottom:8,borderBottom:`2px solid ${color}`}}>
        {label} <span style={{opacity:0.5}}>· {count}</span>
      </div>
    );
    const ViewBtn = ({id, label}) => (
      <button onClick={()=>setVistaDesk(id)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:vistaDesk===id?"#2E2010":"transparent",color:vistaDesk===id?"#F5F0E4":"#8a7a60",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
        {label}
      </button>
    );

    return (
      <div style={{background:"#F5F0E4",minHeight:"100vh",fontFamily:"'Nunito',sans-serif",color:"#2E2010"}}>
        {/* Header */}
        <div style={{padding:"14px 32px",borderBottom:"1px solid #e0d8c8",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
          <div style={{flexShrink:0}}>
            <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#B87A3A",fontWeight:800}}>ram peris</div>
            <div style={{fontSize:20,fontWeight:800}}>sesiones</div>
          </div>
          <div style={{background:"#e8e0d0",borderRadius:10,padding:3,display:"flex",gap:2}}>
            <ViewBtn id="pipeline" label="Pipeline"/>
            <ViewBtn id="dashboard" label="Dashboard"/>
          </div>
          <SyncBar state={syncState} onRetry={() => triggerSave(sesiones)}/>
          <div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0}}>
            <button onClick={nuevaSesion} style={{background:"#B87A3A",color:"#F5F0E4",border:"none",borderRadius:10,padding:"8px 20px",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"'Nunito',sans-serif"}}>+ nueva sesión</button>
            <button onClick={logout} style={{background:"none",border:"none",color:"#c0a880",fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>salir</button>
          </div>
        </div>

        {/* Pipeline */}
        {vistaDesk === "pipeline" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:20,padding:"24px 32px",alignItems:"flex-start"}}>
            <div>
              <ColHdr label="Pasado" count={pasadas.length} color="#8a7a60"/>
              {pasadas.length === 0 && <div style={{fontSize:12,color:"#c8b890",textAlign:"center",padding:"16px 0"}}>—</div>}
              {pasadas.map(s => <PipelineCard key={s.id} s={s} onClick={() => { setActivaId(s.id); setVista("sesion"); setReporte(false); }}/>)}
            </div>
            <div>
              <ColHdr label="Próximo (≤14 días)" count={proximas.length} color="#B87A3A"/>
              {proximas.length === 0 && <div style={{fontSize:12,color:"#c8b890",textAlign:"center",padding:"16px 0"}}>—</div>}
              {proximas.map(s => <PipelineCard key={s.id} s={s} onClick={() => { setActivaId(s.id); setVista("sesion"); setReporte(false); }}/>)}
            </div>
            <div>
              <ColHdr label="Por venir" count={futuras.length} color="#424029"/>
              {futuras.length === 0 && <div style={{fontSize:12,color:"#c8b890",textAlign:"center",padding:"16px 0"}}>—</div>}
              {futuras.map(s => <PipelineCard key={s.id} s={s} onClick={() => { setActivaId(s.id); setVista("sesion"); setReporte(false); }}/>)}
            </div>
          </div>
        )}

        {/* Dashboard */}
        {vistaDesk === "dashboard" && (
          <div style={{padding:"24px 32px"}}>
            {/* Tabs */}
            <div style={{display:"flex",gap:4,marginBottom:24,background:"#e8e0d0",borderRadius:10,padding:3,width:"fit-content"}}>
              <TabBtn id="resumen" label="Resumen"/>
              <TabBtn id="mes"     label="Por mes"/>
              <TabBtn id="tipo"    label="Por tipo"/>
            </div>

            {/* Tab: Resumen */}
            {dashTab === "resumen" && (
              <div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20,alignItems:"center"}}>
                  <span style={{fontSize:10,letterSpacing:1,textTransform:"uppercase",fontWeight:800,color:"#c8b890",marginRight:4}}>Mes</span>
                  <button onClick={()=>setFiltroMes(null)} style={{padding:"5px 12px",borderRadius:8,border:"none",background:filtroMes===null?"#2E2010":"#e8e0d0",color:filtroMes===null?"#F5F0E4":"#8a7a60",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>Todo</button>
                  {mesesList.map(mes=>(
                    <button key={mes} onClick={()=>setFiltroMes(filtroMes===mes?null:mes)} style={{padding:"5px 12px",borderRadius:8,border:"none",background:filtroMes===mes?"#B87A3A":"#e8e0d0",color:filtroMes===mes?"#F5F0E4":"#8a7a60",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>{mes}</button>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:28}}>
                  {[
                    {label:"Sesiones",  value:totalSes,            amber:false},
                    {label:"Asistentes",value:totalAsis,           amber:false},
                    {label:"Ingresos",  value:fmt(totalIng),       amber:true},
                    {label:"Mi parte",  value:fmt(totalMiP),       amber:true},
                    {label:"No-shows",  value:totalNoS,            amber:false},
                  ].map(({label,value,amber}) => (
                    <div key={label} style={{background:"#fff",borderRadius:12,padding:"14px 16px",border:"1.5px solid #e0d8c8"}}>
                      <div style={{fontSize:10,letterSpacing:1.2,textTransform:"uppercase",fontWeight:800,color:"#8a7a60",marginBottom:6}}>{label}</div>
                      <div style={{fontSize:24,fontWeight:800,color:amber?"#B87A3A":"#2E2010"}}>{value}</div>
                    </div>
                  ))}
                </div>
                {totalAsis > 0 && (
                  <div style={{fontSize:12,color:"#8a7a60"}}>
                    Tasa no-show: <strong>{Math.round((totalNoS/(totalAsis+totalNoS))*100)}%</strong>
                    &nbsp;·&nbsp;Media asistentes/sesión: <strong>{totalSes>0?(totalAsis/totalSes).toFixed(1):0}</strong>
                    &nbsp;·&nbsp;Media ingresos/sesión: <strong>{fmt(totalSes>0?totalIng/totalSes:0)}</strong>
                  </div>
                )}
              </div>
            )}

            {/* Tab: Por mes */}
            {dashTab === "mes" && (
              <div style={{maxWidth:680}}>
                {mesesList.length === 0 && <div style={{color:"#c8b890",fontSize:13}}>Sin datos</div>}
                {mesesList.map(mes => {
                  const m = porMes[mes];
                  const isOpen = mesExpandido === mes;
                  const sesDeMes = sesiones.filter(s=>getMes(s.fecha)===mes).sort((a,b)=>parseFecha(a.fecha)-parseFecha(b.fecha));
                  return (
                    <div key={mes} style={{background:"#fff",borderRadius:12,marginBottom:10,border:"1.5px solid #e0d8c8",overflow:"hidden"}}>
                      <div onClick={()=>setMesExpandido(isOpen?null:mes)} style={{padding:"14px 18px",cursor:"pointer"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontWeight:800,fontSize:15}}>{mes}</span>
                            <span style={{fontSize:10,color:"#c8b890",lineHeight:1}}>{isOpen?"▲":"▼"}</span>
                          </div>
                          <div style={{display:"flex",gap:20,fontSize:12,color:"#8a7a60"}}>
                            <span>{m.sesiones} {m.sesiones!==1?"sesiones":"sesión"}</span>
                            <span>{m.asistentes} asist.</span>
                            {m.noShows > 0 && <span style={{color:"#B87A3A"}}>{m.noShows} no-show</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{flex:1}}><Bar val={m.miParte} max={maxIngMes}/></div>
                          <span style={{fontSize:13,fontWeight:800,color:"#B87A3A",minWidth:64,textAlign:"right"}}>{fmt(m.miParte)}</span>
                        </div>
                      </div>
                      {isOpen && (
                        <div style={{borderTop:"1px solid #ede8e0",background:"#faf8f4"}}>
                          {sesDeMes.map((s,i) => {
                            const sf = finanzas(s);
                            const act = s.asistentes.filter(a=>a.estado!=="no viene").reduce((n,a)=>n+(a.x2?2:1),0);
                            return (
                              <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 18px",borderBottom:i<sesDeMes.length-1?"1px solid #ede8e0":"none"}}>
                                <div>
                                  <span style={{fontWeight:700,fontSize:13,color:"#2E2010"}}>{s.nombre}</span>
                                  <span style={{color:"#c8b890",marginLeft:8,fontSize:11}}>{s.fecha}</span>
                                </div>
                                <div style={{display:"flex",gap:16,alignItems:"center",flexShrink:0}}>
                                  <span style={{fontSize:11,color:"#8a7a60"}}>{act} asist.</span>
                                  <span style={{fontSize:13,fontWeight:700,color:"#B87A3A"}}>{fmt(sf.miParte)}</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Tab: Por tipo */}
            {dashTab === "tipo" && (
              <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
                {/* Tarjetas por tipo */}
                <div style={{width:300,flexShrink:0}}>
                  {Object.keys(porTipo).length === 0 && <div style={{color:"#c8b890",fontSize:13}}>Sin datos</div>}
                  {Object.entries(porTipo).sort((a,b)=>b[1].ingresos-a[1].ingresos).map(([tipo, t]) => (
                    <div key={tipo} style={{background:"#fff",borderRadius:12,padding:"14px 18px",marginBottom:10,border:"1.5px solid #e0d8c8",display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:10,height:10,borderRadius:2,background:TIPO_COLOR[tipo]||"#c8b890",flexShrink:0}}/>
                      <span style={{fontWeight:800,fontSize:14,flex:1}}>{labelTipo(tipo)}</span>
                      <span style={{fontSize:20,fontWeight:800,color:"#B87A3A"}}>{fmt(t.miParte)}</span>
                    </div>
                  ))}
                </div>
                {/* Gráfico de líneas */}
                {mesesList.length > 0 && (() => {
                  const PAD = {top:16,right:12,bottom:28,left:44};
                  const W = 480; const H = 210;
                  const cW = W-PAD.left-PAD.right; const cH = H-PAD.top-PAD.bottom;
                  const allVals = mesesList.flatMap(mes=>TIPOS_EVENTO.map(t=>(monthTypeMiP[mes]||{})[t.id]||0));
                  const rawMax = Math.max(...allVals,1);
                  const niceMax = Math.ceil(rawMax/50)*50;
                  const yTicks = [0,1,2,3,4].map(i=>Math.round(niceMax*i/4));
                  const xPos = i => PAD.left + (mesesList.length<2 ? cW/2 : (i/(mesesList.length-1))*cW);
                  const yPos = v => PAD.top + cH - (v/niceMax)*cH;
                  const tiposConDatos = TIPOS_EVENTO.filter(t=>porTipo[t.id]);
                  return (
                    <div style={{width:360,flexShrink:0,background:"#fff",borderRadius:12,padding:"16px 20px",border:"1.5px solid #e0d8c8"}}>
                      <div style={{fontSize:10,letterSpacing:1.2,textTransform:"uppercase",fontWeight:800,color:"#8a7a60",marginBottom:10}}>Evolución mensual (€ tuyo)</div>
                      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
                        {/* grid + Y labels */}
                        {yTicks.map(tick=>(
                          <g key={tick}>
                            <line x1={PAD.left} y1={yPos(tick)} x2={W-PAD.right} y2={yPos(tick)} stroke="#e8e0d0" strokeWidth={tick===0?"1.5":"1"} strokeDasharray={tick===0?"none":"3,3"}/>
                            <text x={PAD.left-6} y={yPos(tick)+4} textAnchor="end" fontSize="9" fill="#a09080" fontFamily="Nunito,sans-serif">{tick===0?"0":`${tick}€`}</text>
                          </g>
                        ))}
                        {/* X labels */}
                        {mesesList.map((mes,i)=>(
                          <text key={mes} x={xPos(i)} y={H-6} textAnchor="middle" fontSize="9" fill="#a09080" fontFamily="Nunito,sans-serif">{mes.split(" ")[0]}</text>
                        ))}
                        {/* Lines + puntos + valores */}
                        {tiposConDatos.map(t=>{
                          const pts = mesesList.map((mes,i)=>`${xPos(i)},${yPos((monthTypeMiP[mes]||{})[t.id]||0)}`).join(" ");
                          return (
                            <g key={t.id}>
                              <polyline points={pts} fill="none" stroke={TIPO_COLOR[t.id]} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                              {mesesList.map((mes,i)=>{
                                const v=(monthTypeMiP[mes]||{})[t.id]||0;
                                if(!v) return null;
                                const cx=xPos(i), cy=yPos(v);
                                return <g key={mes}>
                                  <circle cx={cx} cy={cy} r="3.5" fill={TIPO_COLOR[t.id]} stroke="#fff" strokeWidth="1.5"/>
                                  <text x={cx} y={cy-8} textAnchor="middle" fontSize="8" fontWeight="700" fill={TIPO_COLOR[t.id]} fontFamily="Nunito,sans-serif">{fmt(v)}</text>
                                </g>;
                              })}
                            </g>
                          );
                        })}
                      </svg>
                      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginTop:6}}>
                        {tiposConDatos.map(t=>(
                          <div key={t.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
                            <div style={{width:18,height:2.5,background:TIPO_COLOR[t.id],borderRadius:2,flexShrink:0}}/>
                            <span style={{color:"#8a7a60"}}>{t.label}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // ── LISTADO MÓVIL ─────────────────────────────────────────────────────────
  if (vista === "sesiones") return (
    <div style={wrap}>
      <div style={{padding:"28px 20px 14px",borderBottom:"1px solid #e0d8c8",display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#B87A3A",fontWeight:800,marginBottom:4}}>ram peris</div>
          <div style={{fontSize:24,fontWeight:800}}>sesiones</div>
        </div>
        <button onClick={logout} style={{background:"none",border:"none",color:"#c0a880",fontSize:11,cursor:"pointer",paddingBottom:4}}>salir</button>
      </div>
      <SyncBar state={syncState} onRetry={() => triggerSave(sesiones)}/>
      <div style={{padding:"16px 20px 0"}}>
        {sesiones.length===0 && (
          <div style={{color:"#B87A3A",textAlign:"center",marginTop:40,fontSize:14}}>sin sesiones todavía</div>
        )}
        {(() => {
          const hoy = new Date(); hoy.setHours(0,0,0,0);
          const sorted = [...sesiones].sort((a,b) => {
            const fa = parseFecha(a.fecha), fb = parseFecha(b.fecha);
            const aPast = fa < hoy, bPast = fb < hoy;
            if (!aPast && !bPast) return fa - fb;
            if (aPast && bPast)   return fb - fa;
            return aPast ? 1 : -1;
          });
          return sorted.map((s, i) => {
            const isPast     = parseFecha(s.fecha) < hoy;
            const firstPast  = isPast && (i === 0 || parseFecha(sorted[i-1].fecha) >= hoy);
            const fin    = finanzas(s);
            const activos= s.asistentes.filter(a=>a.estado!=="no viene").reduce((n,a)=>n+(a.x2?2:1),0);
            const total  = s.asistentes.reduce((n,a)=>n+(a.x2?2:1),0);
            const noV    = s.asistentes.filter(a=>a.estado==="no viene").reduce((n,a)=>n+(a.x2?2:1),0);
            return (
              <React.Fragment key={s.id}>
                {firstPast && (
                  <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 12px"}}>
                    <div style={{flex:1,height:1,background:"#e0d8c8"}}/>
                    <span style={{fontSize:10,letterSpacing:1.5,textTransform:"uppercase",fontWeight:800,color:"#c8b890"}}>pasadas</span>
                    <div style={{flex:1,height:1,background:"#e0d8c8"}}/>
                  </div>
                )}
                <div style={{marginBottom:10}}>
                  <div onClick={() => { setActivaId(s.id); setVista("sesion"); setReporte(false); }} style={{background:"#fff",borderRadius:14,padding:"14px 16px",cursor:"pointer",border:`1.5px solid ${isPast?"#ede8e0":"#e0d8c8"}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,opacity:isPast?0.75:1}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:16}}>{s.nombre}</div>
                      <div style={{fontSize:12,color:"#8a7a60",marginTop:2}}>{s.fecha}</div>
                      {s.tipo === "donacion" && fin.cobrado>0 && (
                        <div style={{fontSize:12,marginTop:3}}>
                          <span style={{color:"#424029",fontWeight:700}}>{fmt(fin.cobrado)} donación</span>
                          <span style={{color:"#B87A3A",fontWeight:700}}> · {fmt(fin.miParte)} tuyo</span>
                        </div>
                      )}
                      {s.tipo !== "donacion" && s.precioTotal && fin.cobrado>0 && (
                        <div style={{fontSize:12,marginTop:3}}>
                          <span style={{color:"#424029",fontWeight:700}}>{fmt(fin.cobrado)} cobrado</span>
                          <span style={{color:"#B87A3A",fontWeight:700}}> · {fmt(fin.miParte)} tuyo</span>
                        </div>
                      )}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                      <Pill label={`${activos}/${total}`} color={isPast?"#8a7a60":"#424029"}/>
                      {noV>0 && <Pill label={`-${noV}`} color="#B87A3A"/>}
                      <span style={{fontSize:18,color:"#B87A3A"}}>›</span>
                    </div>
                  </div>
                  {confirmDel===s.id
                    ? (
                      <div style={{display:"flex",gap:8,marginTop:6,padding:"0 4px"}}>
                        <button onClick={() => { setSes(p=>p.filter(x=>x.id!==s.id)); setConfirmDel(null); }} style={bsm("#2E2010","#F5F0E4")}>eliminar</button>
                        <button onClick={() => setConfirmDel(null)} style={bsm("#e0d8c8","#2E2010")}>cancelar</button>
                      </div>
                    ) : (
                      <button onClick={e => { e.stopPropagation(); setConfirmDel(s.id); }} style={{background:"none",border:"none",color:"#c0a880",fontSize:11,padding:"4px 4px 0",cursor:"pointer"}}>eliminar sesión</button>
                    )
                  }
                </div>
              </React.Fragment>
            );
          });
        })()}
      </div>
      <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 40px)",maxWidth:440}}>
        <button onClick={nuevaSesion} style={btnPrimary()}>+ nueva sesión</button>
      </div>
    </div>
  );

  // ── SESIÓN ────────────────────────────────────────────────────────────────
  if (!activa) { setVista("sesiones"); return null; }
  const fin  = finanzas(activa);
  const tP   = !!activa.precioTotal;
  const byEstado   = e => activa.asistentes.filter(a => a.estado===e);
  const countPlazas= list => list.reduce((n,a) => n+(a.x2?2:1), 0);

  return (
    <div style={wrap}>
      <div style={{...hdr,alignItems:"flex-start"}}>
        <button onClick={() => setVista("sesiones")} style={backB}>‹</button>
        <div style={{flex:1}}>
          {editNombre
            ? <input autoFocus value={nuevoNombre} onChange={e => setNuevoNombre(e.target.value)}
                onBlur={() => { if(nuevoNombre.trim()) upd(activaId,{nombre:nuevoNombre.trim()}); setEditNombre(false); }}
                onKeyDown={e => { if(e.key==="Enter") e.target.blur(); }}
                style={{...inp(),padding:"2px 0",border:"none",borderBottom:"2px solid #B87A3A",borderRadius:0,fontSize:20,fontWeight:800}}/>
            : <div onClick={() => { setEditNombre(true); setNuevoNombre(activa.nombre); }} style={{fontSize:20,fontWeight:800,cursor:"text"}}>
                {activa.nombre} <span style={{fontSize:13,color:"#B87A3A"}}>✎</span>
              </div>
          }
          <div style={{fontSize:11,color:"#8a7a60"}}>{activa.fecha}</div>
        </div>
        <button onClick={() => { setConfig({...activa}); setVista("config"); }} style={{background:"none",border:"1.5px solid #e0d8c8",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,color:"#8a7a60",fontWeight:700}}>✎</button>
        {confirmDel === activaId
          ? <div style={{display:"flex",gap:6}}>
              <button onClick={() => { setSes(p=>p.filter(x=>x.id!==activaId)); setConfirmDel(null); setVista("sesiones"); }} style={bsm("#2E2010","#F5F0E4")}>eliminar</button>
              <button onClick={() => setConfirmDel(null)} style={bsm("#e0d8c8","#2E2010")}>cancelar</button>
            </div>
          : <button onClick={() => setConfirmDel(activaId)} style={{background:"none",border:"1.5px solid #e0d8c8",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,color:"#c0a880",fontWeight:700}}>✕</button>
        }
      </div>
      <SyncBar state={syncState} onRetry={() => triggerSave(sesiones)}/>

      <div style={{display:"flex",gap:6,padding:"12px 20px",borderBottom:"1px solid #e0d8c8"}}>
        <SB label="total"    value={activa.asistentes.reduce((n,a)=>n+(a.x2?2:1),0)}/>
        <SB label="completo" value={countPlazas(byEstado("completo"))} accent/>
        <SB label="reserva"  value={countPlazas(byEstado("reserva"))}  amber/>
        <SB label="no viene" value={byEstado("no viene").length}        muted/>
      </div>

      {activa.tipo === "donacion" ? (
        <div style={{margin:"10px 20px",background:"#2E2010",borderRadius:14,padding:"14px 16px",color:"#F5F0E4"}}>
          <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:"#c8b890",fontWeight:800,marginBottom:10}}>donación recibida</div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <input
              value={activa.donacion||""}
              onChange={e => upd(activaId,{donacion:e.target.value})}
              placeholder="0"
              inputMode="decimal"
              style={{flex:1,fontSize:24,fontWeight:800,padding:"8px 12px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#F5F0E4",outline:"none",fontFamily:"'Nunito',sans-serif"}}
            />
            <span style={{fontSize:20,color:"#c8b890",fontWeight:700}}>€</span>
          </div>
          {(parseFloat(activa.donacion)||0) > 0 && (
            <div style={{marginTop:10,fontSize:13,color:"#c8b890"}}>
              tuyo ({activa.splitPct}%): <span style={{color:"#F5F0E4",fontWeight:800}}>{fmt(fin.miParte)}</span>
            </div>
          )}
        </div>
      ) : tP && (
        <div style={{margin:"10px 20px",background:"#2E2010",borderRadius:14,padding:"14px 16px",color:"#F5F0E4"}}>
          <div onClick={() => setReporte(!reporte)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
            <div>
              <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:"#c8b890",fontWeight:800,marginBottom:2}}>ingresos</div>
              <div style={{fontSize:28,fontWeight:800,lineHeight:1}}>{fmt(fin.cobrado)}</div>
              <div style={{fontSize:12,color:"#c8b890",marginTop:4}}>tuyo: <span style={{color:"#F5F0E4",fontWeight:800}}>{fmt(fin.miParte)}</span></div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#c8b890",marginBottom:4}}>pendiente</div>
              <div style={{fontSize:22,fontWeight:800,color:fin.pendiente>0?"#B87A3A":"#c8b890"}}>{fmt(fin.pendiente)}</div>
              <div style={{fontSize:11,color:"#6a5840",marginTop:6}}>{reporte?"▲ cerrar":"▼ detalle"}</div>
            </div>
          </div>
          {reporte && (
            <div style={{marginTop:12,borderTop:"1px solid #4a3820",paddingTop:12}}>
              <FR label="precio completo" value={fmt(parseFloat(activa.precioTotal)||0)}/>
              {activa.precioReserva && <FR label="precio reserva" value={fmt(parseFloat(activa.precioReserva)||0)}/>}
              <FR label="split" value={`${activa.splitPct}% tuyo`}/>
              <div style={{borderTop:"1px solid #4a3820",marginTop:8,paddingTop:8}}>
                <FR label="total cobrado"   value={fmt(fin.cobrado)}   bold/>
                <FR label="aún pendiente"   value={fmt(fin.pendiente)}/>
                <FR label="potencial total" value={fmt(fin.total)}/>
                <FR label={`tu parte (${activa.splitPct}%)`} value={fmt(fin.miParte)} bold/>
              </div>
            </div>
          )}
        </div>
      )}

      <div style={{padding:"12px 20px",borderBottom:"1px solid #e0d8c8",display:"flex",gap:8,alignItems:"center"}}>
        <input value={inputAs} onChange={e => setInputAs(e.target.value)} onKeyDown={e => { if(e.key==="Enter") addAs(); }} placeholder="nombre..." style={{...inp(),flex:1}}/>
        <button onClick={() => setX2New(!x2New)} style={{background:x2New?"#B87A3A":"#e0d8c8",color:x2New?"#F5F0E4":"#8a7a60",border:"none",borderRadius:10,padding:"10px 12px",fontSize:12,fontWeight:800,cursor:"pointer",flexShrink:0}}>x2</button>
        <button onClick={addAs} style={{background:"#2E2010",color:"#F5F0E4",border:"none",borderRadius:10,padding:"10px 16px",fontSize:20,fontWeight:800,cursor:"pointer",flexShrink:0,lineHeight:1}}>+</button>
      </div>

      <div style={{padding:"10px 20px 0"}}>
        {activa.asistentes.map(a => (
          <AsRow key={a.id} a={a} s={activa}
            onCycle={() => cycleAs(a.id)}
            onSet={e => setEstadoAs(a.id,e)}
            onX2={() => toggleX2As(a.id)}
            onDel={() => delAs(a.id)}
            onRename={nombre => renameAs(a.id, nombre)}
          />
        ))}
        {activa.asistentes.length===0 && (
          <div style={{textAlign:"center",color:"#B87A3A",marginTop:40,fontSize:14}}>añade el primer asistente</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
