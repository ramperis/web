<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>gestión · ram peris</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F5F0E4; font-family: 'Nunito', sans-serif; }
    input, button, select { font-family: 'Nunito', sans-serif; }
    #root { height: 100%; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PASS        = "Gratitudeterna";
const AUTH_KEY    = "ram_gestion_auth";
const ESTADOS     = ["pendiente", "reserva", "completo", "no viene"];
const COLOR = {
  pendiente:  { bg: "#F5F0E4", text: "#2E2010", border: "#e0d8c8" },
  reserva:    { bg: "#B87A3A", text: "#F5F0E4", border: "#B87A3A" },
  completo:   { bg: "#424029", text: "#F5F0E4", border: "#424029" },
  "no viene": { bg: "#2E2010", text: "#c8b890", border: "#2E2010" },
};
const LABEL = {
  pendiente:  "pendiente",
  reserva:    "reserva",
  completo:   "✓ completo",
  "no viene": "no viene",
};

function genId()  { return Math.random().toString(36).slice(2,9); }
function today()  { return new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function fmt(n)   {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return n % 1 === 0 ? `${n}€` : `${n.toFixed(2)}€`;
}
function savedAuth() {
  try { return localStorage.getItem(AUTH_KEY) === PASS; } catch { return false; }
}

function cobradoAs(a, s) {
  const pt = parseFloat(s.precioTotal)||0, pr = parseFloat(s.precioReserva)||0, p = a.x2?2:1;
  if (a.estado === "completo") return pt * p;
  if (a.estado === "reserva")  return pr * p;
  return 0;
}
function pendienteAs(a, s) {
  const pt = parseFloat(s.precioTotal)||0, pr = parseFloat(s.precioReserva)||0, p = a.x2?2:1;
  if (a.estado === "completo")  return 0;
  if (a.estado === "reserva")   return (pt - pr) * p;
  if (a.estado === "pendiente") return pt * p;
  return 0;
}
function finanzas(s) {
  const act = s.asistentes.filter(a => a.estado !== "no viene");
  const cobrado   = act.reduce((n,a) => n + cobradoAs(a,s), 0);
  const pendiente = act.reduce((n,a) => n + pendienteAs(a,s), 0);
  return { cobrado, pendiente, total: cobrado+pendiente, miParte: cobrado*(s.splitPct/100) };
}

// ── STYLES ───────────────────────────────────────────────────────────────────
const wrap  = { fontFamily:"'Nunito',sans-serif", background:"#F5F0E4", minHeight:"100vh", color:"#2E2010", maxWidth:480, margin:"0 auto", paddingBottom:80 };
const hdr   = { padding:"18px 20px 14px", borderBottom:"1px solid #e0d8c8", display:"flex", alignItems:"center", gap:10 };
const backB = { background:"none", border:"none", fontSize:24, cursor:"pointer", color:"#B87A3A", padding:0, lineHeight:1 };
const inp   = () => ({ width:"100%", fontSize:15, padding:"10px 14px", borderRadius:10, border:"1.5px solid #e0d8c8", background:"#fff", outline:"none", color:"#2E2010" });
const btnPrimary = () => ({ width:"100%", background:"#B87A3A", color:"#F5F0E4", border:"none", borderRadius:14, padding:"16px", fontSize:15, fontWeight:800, cursor:"pointer", letterSpacing:0.5 });
const bsm = (bg, color) => ({ background:bg, color, border:"none", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer" });

// ── COMPONENTS ───────────────────────────────────────────────────────────────
function FR({label, value, bold}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
      <span style={{color:"#c8b890"}}>{label}</span>
      <span style={{fontWeight:bold?800:600,color:bold?"#F5F0E4":"#c8b890"}}>{value}</span>
    </div>
  );
}
function SB({label, value, accent, amber, muted}) {
  return (
    <div style={{flex:1,background:accent?"#424029":amber?"#B87A3A":muted?"#e8e0d0":"#fff",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
      <div style={{fontSize:20,fontWeight:800,color:accent||amber?"#F5F0E4":muted?"#8a7a60":"#2E2010"}}>{value}</div>
      <div style={{fontSize:9,letterSpacing:0.8,textTransform:"uppercase",color:accent||amber?"rgba(255,255,255,0.6)":"#8a7a60",fontWeight:700}}>{label}</div>
    </div>
  );
}
function Pill({label, color}) {
  return <div style={{background:color,color:"#F5F0E4",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:800}}>{label}</div>;
}
function Lbl({children}) {
  return <div style={{fontSize:11,letterSpacing:1.2,textTransform:"uppercase",fontWeight:800,color:"#B87A3A",marginBottom:6}}>{children}</div>;
}

function AsRow({a, s, onCycle, onSet, onX2, onDel}) {
  const [open, setOpen] = useState(false);
  const col      = COLOR[a.estado];
  const cobrado  = cobradoAs(a, s);
  const pendiente= pendienteAs(a, s);
  const tP       = !!s.precioTotal;
  return (
    <div style={{marginBottom:8}}>
      <div style={{background:"#fff",borderRadius:open?"12px 12px 0 0":12,border:`1.5px solid ${col.border}`,display:"flex",alignItems:"center",overflow:"hidden"}}>
        <button onClick={onCycle} style={{background:col.bg,color:col.text,border:"none",padding:"12px 10px",fontSize:10,fontWeight:800,cursor:"pointer",minWidth:70,textAlign:"center",letterSpacing:0.3,flexShrink:0}}>
          {LABEL[a.estado]}
        </button>
        <div style={{flex:1,padding:"0 8px"}}>
          <div style={{fontWeight:700,fontSize:15}}>
            {a.nombre}
            {a.x2 && <span style={{fontSize:11,color:"#B87A3A",fontWeight:800,marginLeft:5}}>×2</span>}
          </div>
          {tP && (
            <div style={{fontSize:11,marginTop:1}}>
              {cobrado   > 0 && <span style={{color:"#424029",fontWeight:700}}>{fmt(cobrado)} </span>}
              {pendiente > 0 && <span style={{color:"#B87A3A"}}>· {fmt(pendiente)} pendiente</span>}
              {a.estado === "no viene" && <span style={{color:"#a09080"}}>—</span>}
            </div>
          )}
        </div>
        <button onClick={() => setOpen(!open)} style={{background:"none",border:"none",padding:"12px 14px",cursor:"pointer",color:"#B87A3A",fontSize:16}}>{open?"×":"›"}</button>
      </div>
      {open && (
        <div style={{background:"#fff",borderRadius:"0 0 12px 12px",border:"1.5px solid #e0d8c8",borderTop:"none",padding:"10px 12px",display:"flex",gap:8,flexWrap:"wrap"}}>
          {ESTADOS.map(e => (
            <button key={e} onClick={() => { onSet(e); setOpen(false); }} style={{...bsm(a.estado===e?COLOR[e].bg:"#F5F0E4",a.estado===e?COLOR[e].text:"#2E2010"),border:`1.5px solid ${a.estado===e?COLOR[e].border:"#e0d8c8"}`}}>
              {LABEL[e]}
            </button>
          ))}
          <button onClick={() => { onX2(); setOpen(false); }} style={bsm(a.x2?"#B87A3A":"#F5F0E4",a.x2?"#F5F0E4":"#8a7a60")}>{a.x2?"quitar ×2":"añadir ×2"}</button>
          <button onClick={() => { onDel(); setOpen(false); }} style={bsm("#2E2010","#F5F0E4")}>eliminar</button>
        </div>
      )}
    </div>
  );
}

// ── SYNC INDICATOR ───────────────────────────────────────────────────────────
function SyncBar({state, onRetry}) {
  if (state === 'idle') return null;
  return (
    <div style={{textAlign:"center",padding:"4px 20px",fontSize:11,color:state==="error"?"#B87A3A":"#8a7a60",background:state==="error"?"rgba(184,122,58,0.08)":"transparent"}}>
      {state === "saving"
        ? "guardando..."
        : <>⚠ error al guardar · <button onClick={onRetry} style={{background:"none",border:"none",color:"#B87A3A",cursor:"pointer",fontWeight:800,fontSize:11,padding:0}}>reintentar</button></>
      }
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [auth,        setAuth]        = useState(savedAuth);
  const [passIn,      setPassIn]      = useState("");
  const [passErr,     setPassErr]     = useState(false);
  const [loading,     setLoading]     = useState(false);
  const [loadErr,     setLoadErr]     = useState(false);
  const [syncState,   setSyncState]   = useState("idle"); // 'idle' | 'saving' | 'error'
  const [sesiones,    setSesiones]    = useState([]);
  const [activaId,    setActivaId]    = useState(null);
  const [vista,       setVista]       = useState("sesiones");
  const [config,      setConfig]      = useState(null);
  const [inputAs,     setInputAs]     = useState("");
  const [x2New,       setX2New]       = useState(false);
  const [editNombre,  setEditNombre]  = useState(false);
  const [nuevoNombre, setNuevoNombre] = useState("");
  const [confirmDel,  setConfirmDel]  = useState(null);
  const [reporte,     setReporte]     = useState(false);

  const shaRef      = useRef(null);
  const timerRef    = useRef(null);
  const activa      = sesiones.find(s => s.id === activaId);

  // ── Cargar datos al autenticarse ──────────────────────────────────────────
  useEffect(() => {
    if (!auth) return;
    setLoading(true);
    setLoadErr(false);
    fetch('/api/gestion', { headers: { Authorization: `Bearer ${PASS}` } })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        setSesiones(data.sesiones || []);
        shaRef.current = data.sha || null;
        setLoading(false);
      })
      .catch(() => {
        setLoadErr(true);
        setLoading(false);
      });
  }, [auth]);

  // ── Guardar (debounced 700ms) ─────────────────────────────────────────────
  function triggerSave(newSesiones) {
    if (timerRef.current) clearTimeout(timerRef.current);
    setSyncState("saving");
    timerRef.current = setTimeout(async () => {
      try {
        const r = await fetch('/api/gestion', {
          method: 'POST',
          headers: { Authorization: `Bearer ${PASS}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ sesiones: newSesiones, sha: shaRef.current }),
        });
        if (!r.ok) throw new Error();
        const { sha } = await r.json();
        shaRef.current = sha;
        setSyncState("idle");
      } catch {
        setSyncState("error");
      }
    }, 700);
  }

  // ── Mutación + save ───────────────────────────────────────────────────────
  function setSes(updater) {
    setSesiones(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      triggerSave(next);
      return next;
    });
  }
  function upd(id, patch) {
    setSes(prev => prev.map(s => s.id === id ? {...s, ...patch} : s));
  }

  // ── LOGIN ─────────────────────────────────────────────────────────────────
  function login() {
    if (passIn === PASS) {
      try { localStorage.setItem(AUTH_KEY, PASS); } catch {}
      setAuth(true);
    } else {
      setPassErr(true);
      setTimeout(() => setPassErr(false), 1500);
    }
  }
  function logout() {
    try { localStorage.removeItem(AUTH_KEY); } catch {}
    setAuth(false);
    setSesiones([]);
    shaRef.current = null;
    setVista("sesiones");
  }

  // ── SESIONES ──────────────────────────────────────────────────────────────
  function nuevaSesion() {
    const s = { id:genId(), nombre:"nueva sesión", fecha:today(), precioTotal:"", precioReserva:"", splitPct:50, asistentes:[] };
    setSes(prev => [s, ...prev]);
    setActivaId(s.id); setConfig({...s}); setVista("config");
  }
  function guardarConfig() {
    upd(activaId, { nombre:config.nombre||"sin nombre", fecha:config.fecha||today(), precioTotal:config.precioTotal, precioReserva:config.precioReserva, splitPct:config.splitPct });
    setVista("sesion");
  }

  // ── ASISTENTES ────────────────────────────────────────────────────────────
  function addAs() {
    const n = inputAs.trim(); if (!n || !activa) return;
    upd(activaId, { asistentes:[...activa.asistentes, {id:genId(),nombre:n,x2:x2New,estado:"pendiente"}] });
    setInputAs(""); setX2New(false);
  }
  function cycleAs(aid) {
    upd(activaId, { asistentes: activa.asistentes.map(a => {
      if (a.id !== aid) return a;
      return {...a, estado: ESTADOS[(ESTADOS.indexOf(a.estado)+1) % ESTADOS.length]};
    })});
  }
  function setEstadoAs(aid, estado) { upd(activaId, { asistentes: activa.asistentes.map(a => a.id===aid?{...a,estado}:a) }); }
  function toggleX2As(aid)          { upd(activaId, { asistentes: activa.asistentes.map(a => a.id===aid?{...a,x2:!a.x2}:a) }); }
  function delAs(aid)               { upd(activaId, { asistentes: activa.asistentes.filter(a => a.id!==aid) }); }

  // ══════════════════════════════════════════════════════════════════════════
  // VISTAS
  // ══════════════════════════════════════════════════════════════════════════

  // ── LOGIN ─────────────────────────────────────────────────────────────────
  if (!auth) return (
    <div style={{...wrap,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{width:"100%",maxWidth:340,padding:"0 24px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#B87A3A",fontWeight:800,marginBottom:6}}>ram peris</div>
          <div style={{fontSize:28,fontWeight:800}}>gestión</div>
        </div>
        <input
          type="password" value={passIn}
          onChange={e => setPassIn(e.target.value)}
          onKeyDown={e => { if (e.key==="Enter") login(); }}
          placeholder="contraseña"
          style={{...inp(),marginBottom:12,textAlign:"center",fontSize:17,letterSpacing:2,border:passErr?"1.5px solid #B87A3A":"1.5px solid #e0d8c8"}}
          autoFocus
        />
        <button onClick={login} style={btnPrimary()}>entrar</button>
        {passErr && <div style={{textAlign:"center",color:"#B87A3A",fontSize:13,marginTop:10}}>contraseña incorrecta</div>}
      </div>
    </div>
  );

  // ── CARGANDO ──────────────────────────────────────────────────────────────
  if (loading) return (
    <div style={{...wrap,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{color:"#B87A3A",fontSize:14,letterSpacing:0.5}}>cargando...</div>
    </div>
  );

  // ── ERROR DE CARGA ────────────────────────────────────────────────────────
  if (loadErr) return (
    <div style={{...wrap,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{textAlign:"center",padding:"0 24px"}}>
        <div style={{fontSize:14,color:"#2E2010",marginBottom:8}}>error al conectar con GitHub</div>
        <div style={{fontSize:12,color:"#8a7a60",marginBottom:24}}>comprueba el token y vuelve a intentarlo</div>
        <button onClick={() => { setLoadErr(false); setAuth(false); }} style={{...btnPrimary(),width:"auto",padding:"12px 32px"}}>volver</button>
      </div>
    </div>
  );

  // ── CONFIG ────────────────────────────────────────────────────────────────
  if (vista === "config" && config) {
    const pv  = parseFloat(config.precioTotal)||0;
    const pvR = parseFloat(config.precioReserva)||0;
    return (
      <div style={wrap}>
        <div style={hdr}>
          <button onClick={() => setVista("sesiones")} style={backB}>‹</button>
          <span style={{fontSize:20,fontWeight:800}}>configurar sesión</span>
        </div>
        <div style={{padding:20}}>
          <Lbl>nombre</Lbl>
          <input value={config.nombre} onChange={e => setConfig(p=>({...p,nombre:e.target.value}))} placeholder="ej. kundalini activation junio" style={inp()}/>
          <div style={{height:16}}/>
          <Lbl>fecha</Lbl>
          <input value={config.fecha} onChange={e => setConfig(p=>({...p,fecha:e.target.value}))} placeholder="ej. 09/06/2026" style={inp()}/>
          <div style={{height:16}}/>
          <Lbl>precio por persona (€)</Lbl>
          <input value={config.precioTotal} onChange={e => setConfig(p=>({...p,precioTotal:e.target.value}))} placeholder="ej. 35" inputMode="decimal" style={inp()}/>
          <div style={{height:16}}/>
          <Lbl>precio reserva (€) <span style={{color:"#B87A3A",fontWeight:400}}>opcional</span></Lbl>
          <input value={config.precioReserva} onChange={e => setConfig(p=>({...p,precioReserva:e.target.value}))} placeholder="ej. 15" inputMode="decimal" style={inp()}/>
          <div style={{height:16}}/>
          <Lbl>tu parte (%)</Lbl>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            {[50,60,70,100].map(pct => (
              <button key={pct} onClick={() => setConfig(p=>({...p,splitPct:pct}))} style={{
                flex:1,padding:"10px 0",borderRadius:10,
                border:`1.5px solid ${config.splitPct===pct?"#B87A3A":"#e0d8c8"}`,
                background:config.splitPct===pct?"#B87A3A":"#fff",
                color:config.splitPct===pct?"#F5F0E4":"#2E2010",
                fontWeight:800,fontSize:15,cursor:"pointer",
              }}>{pct}%</button>
            ))}
          </div>
          {pv>0 && (
            <div style={{marginTop:20,background:"#fff",borderRadius:12,padding:"14px 16px",border:"1.5px solid #e0d8c8"}}>
              <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",fontWeight:800,color:"#B87A3A",marginBottom:8}}>ejemplo · 1 persona</div>
              <FR label="precio completo" value={fmt(pv)}/>
              {pvR>0 && <FR label="si paga reserva" value={fmt(pvR)}/>}
              {pvR>0 && <FR label="resto al llegar"  value={fmt(pv-pvR)}/>}
              <div style={{borderTop:"1px solid #e0d8c8",marginTop:8,paddingTop:8}}>
                <FR label={`tu parte (${config.splitPct}%)`} value={fmt(pv*config.splitPct/100)} bold/>
              </div>
            </div>
          )}
          <button onClick={guardarConfig} style={{...btnPrimary(),marginTop:24}}>guardar y empezar</button>
        </div>
      </div>
    );
  }

  // ── LISTADO ───────────────────────────────────────────────────────────────
  if (vista === "sesiones") return (
    <div style={wrap}>
      <div style={{padding:"28px 20px 14px",borderBottom:"1px solid #e0d8c8",display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#B87A3A",fontWeight:800,marginBottom:4}}>ram peris</div>
          <div style={{fontSize:24,fontWeight:800}}>sesiones</div>
        </div>
        <button onClick={logout} style={{background:"none",border:"none",color:"#c0a880",fontSize:11,cursor:"pointer",paddingBottom:4}}>salir</button>
      </div>
      <SyncBar state={syncState} onRetry={() => triggerSave(sesiones)}/>
      <div style={{padding:"16px 20px 0"}}>
        {sesiones.length===0 && (
          <div style={{color:"#B87A3A",textAlign:"center",marginTop:40,fontSize:14}}>sin sesiones todavía</div>
        )}
        {sesiones.map(s => {
          const fin    = finanzas(s);
          const activos= s.asistentes.filter(a=>a.estado!=="no viene").length;
          const total  = s.asistentes.reduce((n,a)=>n+(a.x2?2:1),0);
          const noV    = s.asistentes.filter(a=>a.estado==="no viene").length;
          return (
            <div key={s.id} style={{marginBottom:10}}>
              <div onClick={() => { setActivaId(s.id); setVista("sesion"); setReporte(false); }} style={{background:"#fff",borderRadius:14,padding:"14px 16px",cursor:"pointer",border:"1.5px solid #e0d8c8",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16}}>{s.nombre}</div>
                  <div style={{fontSize:12,color:"#8a7a60",marginTop:2}}>{s.fecha}</div>
                  {s.precioTotal && fin.cobrado>0 && (
                    <div style={{fontSize:12,marginTop:3}}>
                      <span style={{color:"#424029",fontWeight:700}}>{fmt(fin.cobrado)} cobrado</span>
                      <span style={{color:"#B87A3A",fontWeight:700}}> · {fmt(fin.miParte)} tuyo</span>
                    </div>
                  )}
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                  <Pill label={`${activos}/${total}`} color="#424029"/>
                  {noV>0 && <Pill label={`-${noV}`} color="#B87A3A"/>}
                  <span style={{fontSize:18,color:"#B87A3A"}}>›</span>
                </div>
              </div>
              {confirmDel===s.id
                ? (
                  <div style={{display:"flex",gap:8,marginTop:6,padding:"0 4px"}}>
                    <button onClick={() => { setSes(p=>p.filter(x=>x.id!==s.id)); setConfirmDel(null); }} style={bsm("#2E2010","#F5F0E4")}>eliminar</button>
                    <button onClick={() => setConfirmDel(null)} style={bsm("#e0d8c8","#2E2010")}>cancelar</button>
                  </div>
                ) : (
                  <button onClick={e => { e.stopPropagation(); setConfirmDel(s.id); }} style={{background:"none",border:"none",color:"#c0a880",fontSize:11,padding:"4px 4px 0",cursor:"pointer"}}>eliminar sesión</button>
                )
              }
            </div>
          );
        })}
      </div>
      <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 40px)",maxWidth:440}}>
        <button onClick={nuevaSesion} style={btnPrimary()}>+ nueva sesión</button>
      </div>
    </div>
  );

  // ── SESIÓN ────────────────────────────────────────────────────────────────
  if (!activa) { setVista("sesiones"); return null; }
  const fin  = finanzas(activa);
  const tP   = !!activa.precioTotal;
  const byEstado   = e => activa.asistentes.filter(a => a.estado===e);
  const countPlazas= list => list.reduce((n,a) => n+(a.x2?2:1), 0);

  return (
    <div style={wrap}>
      <div style={{...hdr,alignItems:"flex-start"}}>
        <button onClick={() => setVista("sesiones")} style={backB}>‹</button>
        <div style={{flex:1}}>
          {editNombre
            ? <input autoFocus value={nuevoNombre} onChange={e => setNuevoNombre(e.target.value)}
                onBlur={() => { if(nuevoNombre.trim()) upd(activaId,{nombre:nuevoNombre.trim()}); setEditNombre(false); }}
                onKeyDown={e => { if(e.key==="Enter") e.target.blur(); }}
                style={{...inp(),padding:"2px 0",border:"none",borderBottom:"2px solid #B87A3A",borderRadius:0,fontSize:20,fontWeight:800}}/>
            : <div onClick={() => { setEditNombre(true); setNuevoNombre(activa.nombre); }} style={{fontSize:20,fontWeight:800,cursor:"text"}}>
                {activa.nombre} <span style={{fontSize:13,color:"#B87A3A"}}>✎</span>
              </div>
          }
          <div style={{fontSize:11,color:"#8a7a60"}}>{activa.fecha}</div>
        </div>
        <button onClick={() => { setConfig({...activa}); setVista("config"); }} style={{background:"none",border:"1.5px solid #e0d8c8",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13,color:"#8a7a60",fontWeight:700}}>✎</button>
      </div>
      <SyncBar state={syncState} onRetry={() => triggerSave(sesiones)}/>

      <div style={{display:"flex",gap:6,padding:"12px 20px",borderBottom:"1px solid #e0d8c8"}}>
        <SB label="total"    value={activa.asistentes.reduce((n,a)=>n+(a.x2?2:1),0)}/>
        <SB label="completo" value={countPlazas(byEstado("completo"))} accent/>
        <SB label="reserva"  value={countPlazas(byEstado("reserva"))}  amber/>
        <SB label="no viene" value={byEstado("no viene").length}        muted/>
      </div>

      {tP && (
        <div style={{margin:"10px 20px",background:"#2E2010",borderRadius:14,padding:"14px 16px",color:"#F5F0E4"}}>
          <div onClick={() => setReporte(!reporte)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
            <div>
              <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:"#c8b890",fontWeight:800,marginBottom:2}}>ingresos</div>
              <div style={{fontSize:28,fontWeight:800,lineHeight:1}}>{fmt(fin.cobrado)}</div>
              <div style={{fontSize:12,color:"#c8b890",marginTop:4}}>tuyo: <span style={{color:"#F5F0E4",fontWeight:800}}>{fmt(fin.miParte)}</span></div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#c8b890",marginBottom:4}}>pendiente</div>
              <div style={{fontSize:22,fontWeight:800,color:fin.pendiente>0?"#B87A3A":"#c8b890"}}>{fmt(fin.pendiente)}</div>
              <div style={{fontSize:11,color:"#6a5840",marginTop:6}}>{reporte?"▲ cerrar":"▼ detalle"}</div>
            </div>
          </div>
          {reporte && (
            <div style={{marginTop:12,borderTop:"1px solid #4a3820",paddingTop:12}}>
              <FR label="precio completo" value={fmt(parseFloat(activa.precioTotal)||0)}/>
              {activa.precioReserva && <FR label="precio reserva" value={fmt(parseFloat(activa.precioReserva)||0)}/>}
              <FR label="split" value={`${activa.splitPct}% tuyo`}/>
              <div style={{borderTop:"1px solid #4a3820",marginTop:8,paddingTop:8}}>
                <FR label="total cobrado"   value={fmt(fin.cobrado)}   bold/>
                <FR label="aún pendiente"   value={fmt(fin.pendiente)}/>
                <FR label="potencial total" value={fmt(fin.total)}/>
                <FR label={`tu parte (${activa.splitPct}%)`} value={fmt(fin.miParte)} bold/>
              </div>
            </div>
          )}
        </div>
      )}

      <div style={{padding:"12px 20px",borderBottom:"1px solid #e0d8c8",display:"flex",gap:8,alignItems:"center"}}>
        <input value={inputAs} onChange={e => setInputAs(e.target.value)} onKeyDown={e => { if(e.key==="Enter") addAs(); }} placeholder="nombre..." style={{...inp(),flex:1}}/>
        <button onClick={() => setX2New(!x2New)} style={{background:x2New?"#B87A3A":"#e0d8c8",color:x2New?"#F5F0E4":"#8a7a60",border:"none",borderRadius:10,padding:"10px 12px",fontSize:12,fontWeight:800,cursor:"pointer",flexShrink:0}}>x2</button>
        <button onClick={addAs} style={{background:"#2E2010",color:"#F5F0E4",border:"none",borderRadius:10,padding:"10px 16px",fontSize:20,fontWeight:800,cursor:"pointer",flexShrink:0,lineHeight:1}}>+</button>
      </div>

      <div style={{padding:"10px 20px 0"}}>
        {activa.asistentes.map(a => (
          <AsRow key={a.id} a={a} s={activa}
            onCycle={() => cycleAs(a.id)}
            onSet={e => setEstadoAs(a.id,e)}
            onX2={() => toggleX2As(a.id)}
            onDel={() => delAs(a.id)}
          />
        ))}
        {activa.asistentes.length===0 && (
          <div style={{textAlign:"center",color:"#B87A3A",marginTop:40,fontSize:14}}>añade el primer asistente</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
