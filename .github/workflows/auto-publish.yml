name: Auto Publish Blog Post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Generate and publish post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node auto/generate-post.js

      - name: Commit and push
        run: |
          git config --global user.email "auto@ramperis.com"
          git config --global user.name "Ram Peris Bot"
          git add -A
          git diff --staged --quiet || git commit -m "auto: nuevo post generado"
          git push
